# lance-encoding's build script compiles .proto with a modern flag
# (--experimental_allow_proto3_optional, needs protoc >= 3.12). Ubuntu apt's
# protoc is too old, so fetch a recent release binary. The build script runs
# NATIVELY inside the x86_64 cross container (only the crate is cross-compiled
# to aarch64), so we need the linux-x86_64 protoc.
[target.aarch64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install --assume-yes --no-install-recommends curl unzip ca-certificates",
    "curl -fsSL https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-x86_64.zip -o /tmp/protoc.zip",
    "unzip -o /tmp/protoc.zip -d /usr/local bin/protoc 'include/*'",
    "chmod +x /usr/local/bin/protoc && protoc --version",
]
